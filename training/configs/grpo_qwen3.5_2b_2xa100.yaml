# GRPO training config — Search-R1 on Qwen3.5-2B, 2× A100 80GB.
#
# **Training setup is identical to grpo_qwen3.5_2b_1xa100.yaml.** Every
# [paper]-tagged value is the same. Only [memory]/cluster knobs differ:
#
#   - cluster.gpus_per_node : 2 (was 1)
#   - vllm.tensor_parallel_size : 2 (splits rollout-side weights, frees KV cache budget)
#   - gpu_memory_utilization : 0.7 (was 0.6 — TP=2 means each GPU holds half the vLLM weights)
#
# DTensor backend stays at TP=1 → DDP across the two GPUs for training.
# train_micro_batch_size stays at 4 (DDP doesn't reduce per-GPU memory).
# Pattern recommended in docs/training/NEMO_RL_KNOBS.md §5.

# =============================================================================
# GRPO algorithm — same as 1xa100
# =============================================================================
grpo:
  # [paper] verl `n_agent=5` (GRPO group size G).
  num_generations_per_prompt: 5
  # [paper] 102 × 5 = 510 trajectories per step. Identical to 1× A100 config.
  num_prompts_per_step: 102
  # [paper] verl total_training_steps=1005.
  max_num_steps: 1005
  max_num_epochs: 1
  # [paper] verl test_freq=100.
  val_period: 100
  val_at_start: true
  val_at_end: true
  max_val_samples: 1000
  val_batch_size: 256
  # [paper] verl max_turns=4.
  max_rollout_turns: 4
  normalize_rewards: true
  use_leave_one_out_baseline: true
  overlong_filtering: false
  use_dynamic_sampling: false
  dynamic_sampling_max_gen_batches: 10
  batch_multiplier: 1
  reward_shaping:
    enabled: false
    overlong_buffer_length: 128
    overlong_buffer_penalty: 1
    max_response_length: ${policy.max_total_sequence_length}
    stop_properly_penalty_coef: null
  adv_estimator:
    name: "grpo"
    normalize_rewards: ${grpo.normalize_rewards}
    use_leave_one_out_baseline: ${grpo.use_leave_one_out_baseline}
    minus_baseline: true
  reward_scaling:
    enabled: false
    source_min: 0.0
    source_max: 1.0
    target_min: 0.0
    target_max: 1.0
  seq_logprob_error_threshold: null
  seed: 42
  async_grpo:
    enabled: false
    max_trajectory_age_steps: 1
    in_flight_weight_updates: false
    recompute_kv_cache_after_weight_updates: false

# =============================================================================
# Loss — same as 1xa100
# =============================================================================
loss_fn:
  reference_policy_kl_penalty: 0.001
  reference_policy_kl_type: "k3"
  kl_input_clamp_value: 20.0
  kl_output_clamp_value: 10.0
  ratio_clip_min: 0.2
  ratio_clip_max: 0.2
  ratio_clip_c: null
  use_on_policy_kl_approximation: false
  use_importance_sampling_correction: false
  truncated_importance_sampling_ratio: null
  truncated_importance_sampling_ratio_min: null
  truncated_importance_sampling_type: tis
  sequence_level_importance_ratios: false
  token_level_loss: true
  force_on_policy_ratio: false
  use_kl_in_reward: false

# =============================================================================
# Checkpointing — same as 1xa100
# =============================================================================
checkpointing:
  enabled: true
  checkpoint_dir: "results/grpo/qwen3.5-2b"
  metric_name: "val:accuracy"
  higher_is_better: true
  keep_top_k: 3
  save_period: 100
  checkpoint_must_save_by: null
  model_save_format: "safetensors"
  save_consolidated: false
  save_optimizer: true

# =============================================================================
# Policy
# =============================================================================
policy:
  model_name: "Qwen/Qwen3.5-2B-Base"
  tokenizer:
    name: ${policy.model_name}
    chat_template_kwargs: null
  hf_config_overrides: {}

  # [paper] 510 trajectories — matches 102 × 5 above. Identical to 1× A100.
  train_global_batch_size: 510
  # [memory] Same as 1× A100. DDP doesn't reduce per-GPU policy memory, so
  # train_micro_batch_size stays at 4 (each GPU still has the full model
  # weights + adam state + grads + ref). The 2× A100 win comes from rollout
  # TP=2 (below) and DDP halving the per-GPU prompt count per gradient update.
  train_micro_batch_size: 4
  generation_batch_size: 32
  logprob_batch_size: ${policy.train_micro_batch_size}
  max_total_sequence_length: 4096
  precision: "bfloat16"
  logprob_chunk_size: null
  offload_optimizer_for_logprob: false

  dtensor_cfg:
    _v2: true
    enabled: true
    cpu_offload: false
    sequence_parallel: false
    activation_checkpointing: true
    # [memory] Keep training data-parallel (TP=1); the 2 GPUs ddp the policy.
    # We TP the rollout side (vllm_cfg.tensor_parallel_size: 2) instead.
    tensor_parallel_size: 1
    context_parallel_size: 1
    custom_parallel_plan: null
    automodel_kwargs: {}
    lora_cfg:
      enabled: false
      target_modules: []
      exclude_modules: []
      match_all_linear: true
      dim: 8
      alpha: 32
      dropout: 0.0
      dropout_position: "post"
      lora_A_init: "xavier"
      use_triton: true

  megatron_cfg:
    enabled: false
    force_reconvert_from_hf: false
    empty_unused_memory_level: 1
    activation_checkpointing: false
    converter_type: "Qwen2ForCausalLM"
    tensor_model_parallel_size: 1
    expert_tensor_parallel_size: 1
    expert_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null
    context_parallel_size: 1
    pipeline_dtype: ${policy.precision}
    sequence_parallel: false
    freeze_moe_router: true
    moe_router_dtype: "fp64"
    moe_router_load_balancing_type: "none"
    moe_router_bias_update_rate: 0.0
    moe_permute_fusion: false
    apply_rope_fusion: true
    bias_activation_fusion: true
    defer_fp32_logits: false
    moe_per_layer_logging: false
    moe_enable_deepep: false
    moe_token_dispatcher_type: "alltoall"
    moe_shared_expert_overlap: false
    gradient_accumulation_fusion: false
    peft:
      enabled: false
      target_modules: []
      exclude_modules: []
      dim: 8
      alpha: 32
      dropout: 0.0
      dropout_position: "post"
      lora_A_init_method: "xavier"
      lora_B_init_method: "zero"
      a2a_experimental: false
      lora_dtype: None
    optimizer:
      optimizer: "adam"
      lr: 1.0e-6
      min_lr: 1.0e-7
      weight_decay: 0.01
      bf16: true
      fp16: false
      params_dtype: "float32"
      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_eps: 1e-8
      sgd_momentum: 0.9
      use_distributed_optimizer: true
      use_precision_aware_optimizer: true
      clip_grad: ${policy.max_grad_norm}
      optimizer_cpu_offload: false
      optimizer_offload_fraction: 0.0
    scheduler:
      start_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      end_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      weight_decay_incr_style: "constant"
      lr_decay_style: "constant"
      lr_decay_iters: 1000
      lr_warmup_iters: 286
      lr_warmup_init: 1.0e-7
    distributed_data_parallel_config:
      grad_reduce_in_fp32: false
      overlap_grad_reduce: true
      overlap_param_gather: true
      use_custom_fsdp: false
      data_parallel_sharding_strategy: "optim_grads_params"
    fp8_cfg:
      enabled: false
      fp8: "e4m3"
      fp8_recipe: "blockwise"
      fp8_param: false
    env_vars: null

  draft:
    enabled: false
    model_name: null
    loss_weight: 0.1
    num_layers: null
    aux_layer_indices: null

  dynamic_batching:
    enabled: false
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    sequence_length_round: 64

  sequence_packing:
    enabled: true
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    algorithm: "modified_first_fit_decreasing"
    sequence_length_round: 64

  make_sequence_length_divisible_by: ${policy.dtensor_cfg.tensor_parallel_size}
  max_grad_norm: 1.0

  optimizer:
    name: "torch.optim.AdamW"
    kwargs:
      lr: 1.0e-6
      weight_decay: 0.01
      betas: [0.9, 0.999]
      eps: 1e-8
      foreach: false
      fused: false

  scheduler:
    - name: "torch.optim.lr_scheduler.LinearLR"
      kwargs:
        start_factor: 0.1
        end_factor: 1.0
        total_iters: 286
    - name: "torch.optim.lr_scheduler.ConstantLR"
      kwargs:
        factor: 1.0
        total_iters: 10000000000
    - milestones: [286]

  generation:
    backend: "vllm"
    max_new_tokens: 500
    temperature: 1.0
    top_p: 1.0
    top_k: null
    stop_token_ids: null
    stop_strings: null
    mcore_generation_config:
      buffer_size_gb: 10
      num_cuda_graphs: 4
      block_size_tokens: 256
      use_cuda_graphs_for_non_decode_steps: true
      enable_chunked_prefill: true
      unified_memory_level: 0
      max_tokens: 16384
    vllm_cfg:
      async_engine: false
      precision: ${policy.precision}
      kv_cache_dtype: "auto"
      # [memory] TP=2 splits rollout weights across the two GPUs, halving
      # per-GPU vLLM weight footprint. Training stays DDP at TP=1 (above).
      tensor_parallel_size: 2
      pipeline_parallel_size: 1
      expert_parallel_size: 1
      # [memory] 0.7 (vs 0.6 on 1× A100) — TP=2 frees up per-GPU KV-cache
      # budget since each card now holds half the vLLM weights. Conservative
      # first-run value; raise to 0.8 after observing VRAM headroom.
      gpu_memory_utilization: 0.7
      max_model_len: ${policy.max_total_sequence_length}
      enforce_eager: false
      use_deep_gemm: false
      num_last_layers_in_bf16: 0
      num_first_layers_in_bf16: 0
      enable_vllm_metrics_logger: true
      vllm_metrics_logger_interval: 0.5
    vllm_kwargs: {}
    colocated:
      enabled: true
      resources:
        gpus_per_node: null
        num_nodes: null

# =============================================================================
# Data — same as 1xa100
# =============================================================================
data:
  max_input_seq_length: ${policy.max_total_sequence_length}
  shuffle: true
  num_workers: 1
  use_multiple_dataloader: false
  train:
    dataset_name: search_r1
    data_path: data/training/nq_hotpotqa_train/train.parquet
    arm: qwen_native
    seed: ${grpo.seed}
  validation:
    dataset_name: search_r1
    data_path: data/training/nq_hotpotqa_train/test.parquet
    arm: qwen_native
  default:
    prompt_file: null
    system_prompt_file: null
    processor: search_r1_processor
    env_name: search_r1

# =============================================================================
# Env — same as 1xa100
# =============================================================================
env:
  search_r1:
    arm: qwen_native
    retriever_url: "http://127.0.0.1:3005"
    top_n: 3
    max_turns: 4
    max_obs_chars: 2000
    request_timeout_s: 30.0

# =============================================================================
# Logging — same as 1xa100
# =============================================================================
logger:
  log_dir: "logs"
  num_val_samples_to_print: 5
  wandb_enabled: true
  tensorboard_enabled: false
  mlflow_enabled: false
  swanlab_enabled: false
  monitor_gpus: true
  wandb:
    project: "reason-over-search-training"
    name: "qwen3.5-2b-base-search_r1-qwen_native-2xa100-seed42"
  swanlab:
    project: "reason-over-search-training"
    name: "qwen3.5-2b-base-search_r1-qwen_native-2xa100-seed42"
  tensorboard: {}
  mlflow:
    experiment_name: "reason-over-search-training"
    run_name: "qwen3.5-2b-base-search_r1-qwen_native-2xa100-seed42"
    tracking_uri: "http://localhost:5000"
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10

# =============================================================================
# Cluster — 2× A100
# =============================================================================
cluster:
  gpus_per_node: 2
  num_nodes: 1
