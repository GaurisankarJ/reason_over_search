# ---------------------------------------------------------------------------
# Minimal defaults for serving-only retrieval. Merge with your retriever yaml.
# ---------------------------------------------------------------------------
model2path: {}
model2pooling: {}
method2index: {}
data_dir: "dataset/"
save_dir: "output/"

disable_save: true

gpu_id: "0"
dataset_name: "local"
split: ["test"]
test_sample_num: ~
random_sample: False
seed: 2026
save_intermediate_data: false
save_note: "retriever-serve"

retrieval_method: "e5"
retrieval_model_path: ~
index_path: ~
multimodal_index_path_dict: ~
faiss_gpu: false
faiss_nprobe: ~  # IVF nprobe; only applied when the index is IVF-based (FlatIP ignores it)
corpus_path: ~

instruction: ~
retrieval_topk: 3
retrieval_batch_size: 256
retrieval_use_fp16: true
retrieval_query_max_length: 256
save_retrieval_cache: false
use_retrieval_cache: false
retrieval_cache_path: ~
retrieval_pooling_method: ~
bm25_backend: bm25s
use_sentence_transformer: false

use_reranker: false
rerank_model_name: ~
rerank_model_path: ~
rerank_pooling_method: ~
rerank_topk: 5
rerank_max_length: 512
rerank_batch_size: 256
rerank_use_fp16: true

use_remote_retriever: false
use_multi_retriever: false
multi_retriever_setting:
  merge_method: "concat"
  topk: 5
  rerank_model_name: ~
  rerank_model_path: ~
  retriever_list: []

# Required by Config layout; not used for retrieval serving.
framework: hf
generator_model: "local-placeholder"
openai_setting:
  api_key: ~
  base_url: ~
generator_model_path: ~
generator_max_input_len: 1024
generator_batch_size: 4
generation_params:
  max_tokens: 32
use_fid: false
gpu_memory_utilization: 0.85

metrics: []
metric_setting:
  retrieval_recall_topk: 5
  tokenizer_name: "gpt-4"
save_metric_score: false
