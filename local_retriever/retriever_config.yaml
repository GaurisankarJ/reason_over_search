# ------------------------------------------------Environment Settings------------------------------------------------#
gpu_id: "0"

# -------------------------------------------------Retrieval Settings------------------------------------------------#
# Defaults are CPU + flat index — the safe, hardware-portable setup that runs in /venv/retriever (faiss-cpu).
# To swap to GPU + the IVF-SQ8 index, pass `--gpu --index ./indexes/wiki18_100w_e5_ivf4096_sq8.index` to retriever_serving.py
# (and use the GPU venv at .venv — see README.md).
retrieval_method: "./models/e5-base-v2/"  # name or path of the retrieval model.
index_path: "./indexes/wiki18_100w_e5_flat_inner.index"  # ~65 GB exact float32; CLI --index can override
faiss_gpu: False  # CPU FAISS by default; CLI --gpu can override
faiss_nprobe: 64  # only applied when the index is IVF-based (FlatIP ignores it)
corpus_path: "./corpus/wiki18_100w.jsonl"  # path to corpus in '.jsonl' format that store the documents